---
name: Molecule
# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '!.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - .*
      - LICENSE
      - Pipfile*
  push:
    paths-ignore:
      - '!.github/workflows/**'
      - '**.cfg'
      - '**.md'
      - .*
      - LICENSE
      - Pipfile*
  workflow_dispatch:
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    permissions:
      contents: read
      models: read
    strategy:
      fail-fast: false
      matrix:
        scenario:
          - default
    steps:
      - uses: actions/checkout@v6
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          cache: pip
          cache-dependency-path: |
            .devcontainer/requirements.txt
            Pipfile*
          python-version: '3.12'
      - name: Install Python's requirements
        run: pip install -q -r .devcontainer/requirements.txt
      - name: Install Ansible Galaxy requirements
        run: ansible-galaxy collection install --force -r requirements.yml -p collections
      - name: Install Ansible Galaxy local requirements
        run: ansible-galaxy collection install --force . -p collections
      - name: List installed collections
        run: ansible-galaxy collection list -p collections
      - uses: gofrolist/molecule-action@v2
        env:
          ANSIBLE_FORCE_COLOR: '1'
          ANSIBLE_STDOUT_CALLBACK: ${{ runner.debug == '1' && 'debug' || 'community.general.unixy' }}
          ANSIBLE_COLLECTIONS_PATH: ${{ github.workspace }}/collections
          ANSIBLE_LOAD_CALLBACK_PLUGINS: '1'
          ANSIBLE_DISPLAY_SKIPPED_HOSTS: 'false'
          ANSIBLE_DISPLAY_OK_HOSTS: 'false'
          ANSIBLE_CALLBACK_RESULT_FORMAT: yaml
          DEBIAN_FRONTEND: noninteractive
          MOLECULE_REPORT: molecule-${{ matrix.scenario }}-report.html
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          molecule_args: >-
            --scenario-name ${{ matrix.scenario }}
          molecule_command: test
          molecule_options: ${{ runner.debug == '1' && '--verbose' || '' }}
          molecule_working_dir: roles/github_models
      - if: always()
        name: Ensure report file permissions are correct
        run: sudo chmod 644 molecule-${{ matrix.scenario }}-report.html
        working-directory: roles/github_models
      - if: always()
        name: Converts test report
        uses: patrick-werner/fhir-html-validation-to-markdown@1.0.0
        with:
          input_file: roles/github_models/molecule-${{ matrix.scenario }}-report.html
      # Debug with tmate on failure when debug logging is enabled.
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 30
