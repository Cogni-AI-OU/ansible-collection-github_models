---
name: Test
# yamllint disable-line rule:truthy
on:
  pull_request:
    paths-ignore:
      - '**/*.cfg'
      - '**/*.md'
      - .*
      - Pipfile*
  push:
    paths-ignore:
      - '**/*.cfg'
      - '**/*.md'
      - .*
      - Pipfile*
  workflow_dispatch:
jobs:
  test:
    name: Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
        with:
          path: ${{ github.repository }}
      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          cache: pip
          cache-dependency-path: |
            ${{ github.repository }}/.devcontainer/requirements.txt
            ${{ github.repository }}/Pipfile*
          python-version: '3.12'
      - name: Install Python's requirements
        run: pip install -r .devcontainer/requirements.txt
        working-directory: ${{ github.repository }}
      - name: Run unit tests
        run: pytest tests/unit
        working-directory: ${{ github.repository }}
      - name: Install Ansible Galaxy requirements
      - name: Check Ansible syntax
        run: >-
          ansible-playbook --syntax-check
          -i tests/inventory/docker-containers.yml tests/playbooks/docker-containers.yml
          --verbose
        working-directory: ${{ github.repository }}
      - name: Run Ansible lint
        run: ansible-lint tests/playbooks/docker-containers.yml
        working-directory: ${{ github.repository }}
      - name: Run Ansible playbook
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ansible-playbook -i tests/inventory/docker-containers.yml tests/playbooks/docker-containers.yml
        working-directory: ${{ github.repository }}
      - name: Run Ansible playbook with verify tag
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          ansible-playbook -i tests/inventory/docker-containers.yml tests/playbooks/tags/verify.yml
        working-directory: ${{ github.repository }}

      # Debug with tmate on failure when debug logging is enabled.
      - if: ${{ failure() && runner.debug == '1' }}
        uses: mxschmitt/action-tmate@v3
    timeout-minutes: 20
