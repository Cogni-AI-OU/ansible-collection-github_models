; Config file for Ansible.
; @docs: https://docs.ansible.com/ansible/latest/reference_appendices/config.html
[defaults]
collections_path = ./collections:/home/runner/.ansible/collections:/usr/share/ansible/collections:/home/runner/.local/lib/python3.12/site-packages
# Use the stdout_callback when running ad-hoc commands.
bin_ansible_callbacks = True
display_ok_hosts = no
display_skipped_hosts = no
# Leave the 'cows' alone!
nocows = 1
# Use the condensed unixy callback
stdout_callback = community.general.unixy
callback_result_format = yaml
inject_facts_as_vars = False

[diff]
# Always print diff when running (same as always running with -D/--diff).
always = True
