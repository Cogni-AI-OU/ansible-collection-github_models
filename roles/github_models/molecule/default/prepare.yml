---
- name: Prepare hosts
  hosts: all:!nixos*
  gather_facts: false
  tasks:
    - name: Install Python for Ansible
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        elif command -v apk; then
          apk add --no-cache python3 py3-pip py3-packaging
        elif command -v apt; then
          apt -y update && apt install -y python3-minimal python3-pip python3-packaging
        elif command -v dnf; then
          dnf install -y python3
        elif command -v zypper; then
          zypper --non-interactive install python3
        else
          echo "No supported package manager found" >&2
          exit 1
        fi
    - name: Install azure-ai-inference
      ansible.builtin.pip:
        name: azure-ai-inference
        state: present
        break_system_packages: true
- name: Prepare NixOS hosts
  hosts: nixos*
  gather_facts: false
  tasks:
    - name: Install Python for Ansible on NixOS
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        fi
        mkdir -p /etc/nix
        printf "sandbox = false\n" > /etc/nix/nix.conf
        export NIX_CONFIG="sandbox = false"
        nix-env --option sandbox false \
          -iA nixpkgs.python3 nixpkgs.python3Packages.pip nixpkgs.python3Packages.packaging
    - name: Install azure-ai-inference on NixOS
      ansible.builtin.pip:
        name: azure-ai-inference
        state: present
        break_system_packages: true
      changed_when: false
