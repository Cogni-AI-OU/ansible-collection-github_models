---
- name: Prepare hosts
  hosts: all:!nixos*
  gather_facts: false
  no_log: "{{ ansible_verbosity | default(0) < 1 }}"
  tasks:
    - name: Install Python for Ansible
      ansible.builtin.import_tasks: ../resources/playbooks/install_python.yml
    - name: Install azure-ai-inference and azure-ai-agents
      ansible.builtin.pip:
        name:
          - azure-ai-inference
          - azure-ai-agents
        state: present
        break_system_packages: true
        extra_args: -q
- name: Prepare NixOS hosts
  hosts: nixos*
  gather_facts: false
  no_log: "{{ ansible_verbosity | default(0) < 1 }}"
  tasks:
    - name: Install Python for Ansible on NixOS
      ansible.builtin.raw: |
        if command -v python3 || command -v python; then
          exit 0
        fi
        mkdir -p /etc/nix
        printf "sandbox = false\n" > /etc/nix/nix.conf
        export NIX_CONFIG="sandbox = false"
        nix-env --option sandbox false \
          -iA nixpkgs.python3 nixpkgs.python3Packages.pip > /dev/null
        /root/.nix-profile/bin/pip install -q --break-system-packages packaging
      changed_when: false
    - name: Install azure-ai-inference and azure-ai-agents on NixOS
      ansible.builtin.pip:
        name:
          - azure-ai-inference
          - azure-ai-agents
        state: present
        break_system_packages: true
        extra_args: -q
      changed_when: false
