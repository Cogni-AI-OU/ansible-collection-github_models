---
- name: Verify
  hosts: all
  gather_facts: false
  tasks:
    - name: Test ai_inference_chat in check mode with complex messages
      ai_inference_chat:
        system_prompt: You are a helpful assistant
        messages:
          - role: user
            content: What is the capital of France?
          - role: assistant
            content: The capital of France is Paris.
        prompt: And Germany?
      check_mode: true
      register: github_models_result_check
    - name: Verify check mode result structure and order
      ansible.builtin.assert:
        that:
          - github_models_result_check.messages | length == 4
          - github_models_result_check.messages[0].role == 'system'
          - github_models_result_check.messages[0].content == 'You are a helpful assistant'
          - github_models_result_check.messages[1].content == 'What is the capital of France?'
          - github_models_result_check.messages[2].role == 'assistant'
          - github_models_result_check.messages[3].role == 'user'
          - github_models_result_check.messages[3].content == 'And Germany?'
          - 'github_models_result_check.msg == "Check mode: no request sent"'
    - name: Test ai_inference_chat with actual call (expects GITHUB_TOKEN)
      ai_inference_chat:
        prompt: Hello, this is an automated test. Please respond with 'OK'.
        token: "{{ lookup('env', 'GITHUB_TOKEN') }}"
      register: github_models_result_call
    - name: Verify call response (if token was provided)
      ansible.builtin.assert:
        that:
          - github_models_result_call.message is defined
          - github_models_result_call.message | length > 0
      when: lookup('env', 'GITHUB_TOKEN') | length > 0
    - name: Run unit tests
      ansible.builtin.command: pytest tests/unit
      delegate_to: localhost
      run_once: true
      changed_when: false
      args:
        chdir: "../../../../"
