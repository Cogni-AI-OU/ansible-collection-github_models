---
- name: Install Python for Ansible
  ansible.builtin.raw: |
    if command -v apk; then
      apk update -q && apk add -q --no-cache python3 py3-pip py3-packaging
    elif command -v apt-get; then
      export DEBIAN_FRONTEND=noninteractive
      apt-get update -qq && apt-get install -yqq -o Dpkg::Use-Pty=0 python3 python3-pip python3-packaging
    elif command -v dnf; then
      dnf install -yq python3 python3-pip python3-packaging
    elif command -v zypper; then
      zypper -q --non-interactive install python3 python3-pip python3-packaging
    else
      echo "No supported package manager found" >&2
      exit 1
    fi
  changed_when: false
