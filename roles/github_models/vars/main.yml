---
# Vars file for ansible role.
# Note: Keep YAML keys sorted alphabetically.
# 'github_models_become_method' is expected to be a dictionary keyed by OS family (e.g., 'Debian', 'RedHat'),
# while the default 'null' lets Ansible's default behavior apply.
github_models_become_method:
  _default: ansible.builtin.sudo
  Alpine: ansible.builtin.su
  Darwin: ansible.builtin.sudo
  Debian: ansible.builtin.su
  NixOS: ansible.builtin.su
  OtherLinux: ansible.builtin.su
  Ubuntu: ansible.builtin.su
  Windows: ansible.builtin.runas
