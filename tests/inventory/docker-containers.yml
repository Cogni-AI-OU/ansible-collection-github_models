---
all:
  children:
    docker_containers:
      hosts:
        github_models-on-ubuntu-latest:
          ansible_connection: docker
          ansible_host: github_models-on-ubuntu-latest
          ansible_python_interpreter: /usr/bin/python3
        github_models-on-ubuntu-noble:
          ansible_connection: docker
          ansible_host: github_models-on-ubuntu-noble
          ansible_python_interpreter: /usr/bin/python3
        github_models-on-ubuntu-jammy:
          ansible_connection: docker
          ansible_host: github_models-on-ubuntu-jammy
          ansible_python_interpreter: /usr/bin/python3
        github_models-on-debian-latest:
          ansible_connection: docker
          ansible_host: github_models-on-debian-latest
          ansible_python_interpreter: /usr/bin/python3
        github_models-on-alpine-latest:
          ansible_connection: docker
          ansible_host: github_models-on-alpine-latest
          ansible_python_interpreter: /usr/bin/python3
        github_models-on-nixos-latest:
          ansible_connection: docker
          ansible_distribution: NixOS
          ansible_host: github_models-on-nixos-latest
          ansible_python_interpreter: /root/.nix-profile/bin/python3
